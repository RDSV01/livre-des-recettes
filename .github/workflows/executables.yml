# Construit les exécutables autonomes et les attache à la version publiée.
#
# Déclenchement : un tag de version (« v1.5.0 ») poussé sur le dépôt. Chaque système
# construit son propre fichier (un exécutable ne peut pas être fabriqué pour
# un autre système), puis un dernier travail rassemble les trois et crée la
# version publiée : la création est ainsi faite une seule fois, sans que les
# constructions se marchent dessus.
#
# Les noms des fichiers publiés sont ceux que l'application attend pour se
# mettre à jour toute seule (voir `src/maj.js`) : ne pas les changer sans
# changer aussi `ACTIF_ATTENDU`.

name: Exécutables

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  construire:
    name: ${{ matrix.systeme }}
    runs-on: ${{ matrix.systeme }}
    # Garde-fou : un blocage éventuel échoue en quelques minutes plutôt que de
    # laisser le travail tourner jusqu'au délai maximal (6 h) de GitHub.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - systeme: windows-latest
            construit: dist/livre-des-recettes.exe
            publie: livre-des-recettes-windows.exe
          - systeme: macos-latest
            construit: dist/livre-des-recettes
            publie: livre-des-recettes-macos
          - systeme: ubuntu-latest
            construit: dist/livre-des-recettes
            publie: livre-des-recettes-linux

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      # Le numéro embarqué dans l'exécutable vient de package.json : s'il
      # diffère du tag, la version publiée s'annoncerait sous un faux numéro
      # et proposerait sans fin de se mettre à jour vers elle-même.
      - name: Vérifier que le tag correspond à package.json
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "Le tag $GITHUB_REF_NAME ne correspond pas à la version $version de package.json." >&2
            exit 1
          fi

      - name: Installer les dépendances
        run: npm ci

      - name: Lancer les tests
        # --test-force-exit : sur les runners Unix, une ressource laissée
        # ouverte par un test (connexion HTTP gardée en vie) peut empêcher node
        # de rendre la main une fois les tests passés, ce qui bloquerait la CI.
        # On force la sortie une fois tous les tests terminés.
        run: node --test --test-force-exit

      - name: Vérifier l'application de bout en bout
        run: npm run verifier

      - name: Construire l'exécutable
        run: npm run construire:exe

      - name: Nommer le fichier publié
        shell: bash
        run: mv "${{ matrix.construit }}" "${{ matrix.publie }}"

      # Empreinte SHA-256 jointe à la version : l'application la vérifie avant de
      # se remplacer (voir `src/maj.js`). Calculée avec Node pour un résultat
      # identique sur les trois systèmes, sans dépendre d'un outil du runner.
      - name: Empreinte SHA-256
        shell: bash
        run: >
          node -e "const fs=require('fs'),c=require('crypto');const f=process.argv[1];const h=c.createHash('sha256').update(fs.readFileSync(f)).digest('hex');fs.writeFileSync(f+'.sha256',h+'  '+f+'\n');" "${{ matrix.publie }}"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.publie }}
          path: |
            ${{ matrix.publie }}
            ${{ matrix.publie }}.sha256
          retention-days: 1

  publier:
    name: Publier la version
    needs: construire
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: executables
          merge-multiple: true

      # Action tierce épinglée par empreinte de commit (v3.0.2) : un tag
      # mobile pourrait être redirigé vers un autre code du jour au lendemain.
      - name: Créer la version et y joindre les exécutables
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          # Le tag est déduit de la référence poussée ; l'indiquer évite toute
          # ambiguïté si le travail est relancé à la main.
          tag_name: ${{ github.ref_name }}
          files: executables/*
          generate_release_notes: true
